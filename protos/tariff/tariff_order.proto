syntax = "proto3";

package com.kseb.consumerservice.proto.tariff;

option php_namespace = "Proto\\Tariff";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "parameters/parameter-domain.proto";

message TariffOrderMessage  {
  optional int64 tariff_order_id = 1;
  string order_descriptor = 2;
  string reference_document = 3;
  string published_date = 4;
  string effective_start = 5;
  optional string effective_end = 6;
  string created_ts = 7;
  string updated_ts = 8;
  optional int64 created_by = 9;
  optional int64 updated_by = 10;
  
}
message TariffOrderFormMessage {
  optional int64 tariff_order_id = 1;
  string order_descriptor = 2;
  bytes reference_document = 3; 
  string published_date = 4;
  string effective_start = 5;
  optional string effective_end = 6;
  optional int32 created_by = 7;
  optional int32 updated_by = 8;
  string reference_document_name = 9;
 
}
message TariffOrderUpdateRequest {
  int64 tariff_order_id = 1;
  string order_descriptor = 2;
  optional bytes reference_document = 3; 
  string published_date = 4;
  string effective_start = 5;
  optional string effective_end = 6;
  optional int32 updated_by = 7;
  optional string reference_document_name = 8;
}


message TariffOrderListResponse {
  repeated TariffOrderMessage orders = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}
message TariffOrderListRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  optional string sort_by = 3;    
  optional string sort_direction = 4;
  optional string order_descriptor = 5;
}
message DownloadTariffOrderRequest {
  int64 tariff_order_id = 1;
}

message DownloadTariffOrderResponse {
  string file_name = 1;
  bytes file_data = 2;
}


// ------------ REQUEST/RESPONSE ------------
message CreateTariffOrderRequest  { TariffOrderFormMessage  order = 1; }
message GetTariffOrderRequest     { int64 tariff_order_id = 1; }
message DeleteTariffOrderRequest  { int64 tariff_order_id = 1; int32 deleted_by = 2; }


// ------------ SERVICE ------------
service TariffOrderService {
  rpc CreateTariffOrder (CreateTariffOrderRequest)  returns (TariffOrderMessage);
  rpc GetTariffOrder    (GetTariffOrderRequest)     returns (TariffOrderMessage);
  rpc UpdateTariffOrder (TariffOrderUpdateRequest)  returns (TariffOrderMessage);
  rpc DeleteTariffOrder (DeleteTariffOrderRequest)  returns (google.protobuf.Empty);
  rpc ListTariffOrders  (TariffOrderListRequest)   returns (TariffOrderListResponse);
  rpc DownloadTariffOrder (DownloadTariffOrderRequest)   returns (DownloadTariffOrderResponse);
}