syntax = "proto3";

package com.kseb.consumerservice.proto.tariffconfig;

option php_namespace = "Proto\\Tariff";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "tariff/tariff_order.proto";

// ----------------- ENTITY MESSAGE -----------------
message TariffConfigMessage {
  int64 tariff_config_id = 1;
  int64 tariff_order_id = 2;
  int64 connection_purpose_id = 3;
  int64 connection_tariff_id = 4;
  com.kseb.consumerservice.proto.tariff.TariffOrderMessage tariff_order = 5;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_tariff = 6;

  double consumption_lower_limit = 7;
  optional double consumption_upper_limit = 8;

  double demand_charge_kva = 9;
  double energy_charge_kwh = 10;

  string effective_start = 11;
  string effective_end = 12;

  string created_ts = 13;
  string updated_ts = 14;
  string deleted_at = 15;

  int32 created_by = 16;
  int32 updated_by = 17;
  int32 deleted_by = 18;

  bool is_active = 19;
}

// ----------------- FORM / Create / Update -----------------
message TariffConfigFormMessage {
  optional int64 tariff_config_id = 1; // present for update
  int64 tariff_order_id = 2;
  int64 connection_tariff_id = 3;

  double consumption_lower_limit = 4;
  optional double consumption_upper_limit = 5;

  double demand_charge_kva = 6;
  double energy_charge_kwh = 7;

  string effective_start = 8;
  string effective_end = 9;

  optional int32 created_by = 10;
  optional int32 updated_by = 11;
  optional int32 deleted_by = 12;

  optional bool is_active = 13;
}

message CreateTariffConfigRequest {
  TariffConfigFormMessage config = 1;
}
message CreateTariffConfigResponse {
  TariffConfigMessage config = 1;
}

message CreateMultipleTariffConfigRequest{
repeated TariffConfigFormMessage configs = 1;
}

message CreateMultipleTariffConfigResponse{
repeated TariffConfigMessage created_configs = 1;
}

message UpdateTariffConfigRequest {
  TariffConfigFormMessage config = 1;
}
message UpdateTariffConfigResponse {
  TariffConfigMessage config = 1;
}

// ----------------- Get / Delete -----------------
message GetTariffConfigRequest {
  int64 tariff_config_id = 1;
}
message GetTariffConfigResponse {
  TariffConfigMessage config = 1;
}

message DeleteTariffConfigRequest {
  int64 tariff_config_id = 1;
   optional int32 deleted_by = 2;
}
message DeleteTariffConfigResponse {
  bool success = 1;
  string message = 2;
}

message ListTariffConfigRequest {
  optional int64 tariff_order_id = 1;
  optional int64 connection_tariff_id = 2;
  optional string search = 3;
}
message ListTariffConfigResponse {
  repeated TariffConfigMessage configs = 1;
}

message ListTariffConfigPaginatedRequest {
  optional int64 tariff_order_id = 1;
  optional int64 connection_tariff_id = 2;
  optional string search = 3;

  int32 page_number = 4;
  int32 page_size = 5;
  optional string sort_by = 6;
  optional string sort_direction = 7; 
}

message ListTariffConfigPaginatedResponse {
  repeated TariffConfigMessage configs = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// ----------------- SERVICE -----------------
service TariffConfigService {
  rpc CreateTariffConfig (CreateTariffConfigRequest) returns (CreateTariffConfigResponse);
  rpc UpdateTariffConfig (UpdateTariffConfigRequest) returns (UpdateTariffConfigResponse);
  rpc GetTariffConfig    (GetTariffConfigRequest)    returns (GetTariffConfigResponse);
  rpc DeleteTariffConfig (DeleteTariffConfigRequest) returns (DeleteTariffConfigResponse);
  rpc ListTariffConfig (ListTariffConfigRequest) returns (ListTariffConfigResponse);
  rpc ListTariffConfigPaginated (ListTariffConfigPaginatedRequest) returns (ListTariffConfigPaginatedResponse);
  rpc CreateMultipleTariffConfig (CreateMultipleTariffConfigRequest) returns (CreateMultipleTariffConfigResponse);
}
