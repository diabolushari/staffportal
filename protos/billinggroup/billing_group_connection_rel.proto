syntax = "proto3";

package com.kseb.consumerservice.proto.billinggroup;

option php_namespace = "Proto\\BillingGroupConnectionRel";
option php_metadata_namespace = "GPBMetadata";

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.billinggroup";
option java_outer_classname = "BillingGroupConnectionRelProto";

import "connections/connections.proto";
import "connections/consumer.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ---------------- ENTITY MESSAGE ----------------

message BillingGroupConnectionRelMessage {
  int64 version_id = 1;

  int32 billing_group_id = 2;
  int32 connection_id = 3;

  google.protobuf.Timestamp effective_start = 4;
  optional google.protobuf.Timestamp effective_end = 5;

  bool is_active = 6;

  int32 created_by = 7;
  int32 updated_by = 8;

  google.protobuf.Timestamp deleted_ts = 9;
  int32 deleted_by = 10;
com.kseb.consumerservice.grpc.connections.ConnectionMessage connection = 11;
com.kseb.consumerservice.grpc.connections.ConsumerMessage consumer = 12;

}

// ---------------- REQUEST / RESPONSE ----------------

// Create
message CreateBillingGroupConnectionRelRequest {
  int32 billing_group_id = 1;
  int32 connection_id = 2;

  google.protobuf.Timestamp effective_start = 3;
  optional google.protobuf.Timestamp effective_end = 4;
  int32 created_by = 5;
}

message CreateBillingGroupConnectionRelResponse {
  BillingGroupConnectionRelMessage rel = 1;
}

// Update
message UpdateBillingGroupConnectionRelRequest {
  int64 version_id = 1;

  int32 billing_group_id = 2;
  int32 connection_id = 3;
  
  google.protobuf.Timestamp effective_start = 4;
  optional google.protobuf.Timestamp effective_end = 5;

  bool is_active = 6;
  int32 updated_by = 7;
}

message UpdateBillingGroupConnectionRelResponse {
  BillingGroupConnectionRelMessage rel = 1;
}

// Get
message GetBillingGroupConnectionRelRequest {
  int64 version_id = 1;
  int32 billing_group_id = 2;
  int32 connection_id = 3;
}

message GetBillingGroupConnectionRelResponse {
  BillingGroupConnectionRelMessage rel = 1;
}

// Delete 
message DeleteBillingGroupConnectionRelRequest {
  int64 version_id = 1;
  int32 deleted_by = 2;
}

message DeleteBillingGroupConnectionRelResponse {
  bool success = 1;
  string message = 2;
}

// List
message ListBillingGroupConnectionRelRequest {
  int32 page = 1;
  int32 page_size = 2;

  optional int32 billing_group_id = 3;
  optional int32 connection_id = 4;
  optional bool is_active = 5;
}

message ListBillingGroupConnectionRelResponse {
  repeated BillingGroupConnectionRelMessage rels = 1;
}

// ---------------- SERVICE ----------------

service BillingGroupConnectionRelService {
  rpc CreateBillingGroupConnectionRel (CreateBillingGroupConnectionRelRequest)
      returns (CreateBillingGroupConnectionRelResponse);

  rpc UpdateBillingGroupConnectionRel (UpdateBillingGroupConnectionRelRequest)
      returns (UpdateBillingGroupConnectionRelResponse);

  rpc GetBillingGroupConnectionRel (GetBillingGroupConnectionRelRequest)
      returns (GetBillingGroupConnectionRelResponse);

  rpc DeleteBillingGroupConnectionRel (DeleteBillingGroupConnectionRelRequest)
      returns (DeleteBillingGroupConnectionRelResponse);

  rpc ListBillingGroupConnectionRel (ListBillingGroupConnectionRelRequest)
      returns (ListBillingGroupConnectionRelResponse);
}
