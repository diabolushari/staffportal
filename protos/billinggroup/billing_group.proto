syntax = "proto3";

package com.kseb.consumerservice.proto.billinggroup;

option php_namespace = "Proto\\BillingGroup";
option php_metadata_namespace = "GPBMetadata";

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.billinggroup";
option java_outer_classname = "BillingGroupProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "billinggroup/billing_group_connection_rel.proto";



message BillingGroupConnectionRelFormMessage {
  int64 version_id = 1;
  int32 connection_id = 2;
  google.protobuf.Timestamp effective_start = 3;
  optional google.protobuf.Timestamp effective_end = 4;
  int32 created_by = 5;
}


// --------------------- ENTITY MESSAGE -----------------------

message BillingGroupMessage {
  int64 version_id = 1;

  int32 billing_group_id = 2;

  string name = 3;
  optional string description = 4;

  google.protobuf.Timestamp effective_start = 5;
  optional google.protobuf.Timestamp effective_end = 6;

  bool is_active = 7;

  int32 created_by = 8;
  int32 updated_by = 9;

  google.protobuf.Timestamp deleted_ts = 10;
  int32 deleted_by = 11;

  // Nested child list (same as meterreading.values)
  repeated BillingGroupConnectionRelMessage connections = 12;
  int32 connection_count = 13;
}


// ------------------- REQUEST / RESPONSE MESSAGES --------------------


// -------- Create --------
message CreateBillingGroupRequest {
  int32 billing_group_id = 1;
  string name = 2;
  optional string description = 3;

  google.protobuf.Timestamp effective_start = 4;
  optional google.protobuf.Timestamp effective_end = 5;

  bool is_active = 6;

  int32 created_by = 7;

  // Create BillingGroupConnectionRel inside BillingGroup
  repeated BillingGroupConnectionRelFormMessage connections = 8;
}

message CreateBillingGroupResponse {
  BillingGroupMessage group = 1;
}


// -------- Update --------
message UpdateBillingGroupRequest {
  int64 version_id = 1;

  int32 billing_group_id = 2;
  string name = 3;
  optional string description = 4;

  google.protobuf.Timestamp effective_start = 5;
  optional google.protobuf.Timestamp effective_end = 6;

  bool is_active = 7;

  int32 updated_by = 8;

  // Update or add child relations
  repeated BillingGroupConnectionRelFormMessage connections = 9;
}

message UpdateBillingGroupResponse {
  BillingGroupMessage group = 1;
}


// -------- Get --------
message GetBillingGroupRequest {
  int64 version_id = 1;
  optional int32 billing_group_id = 2;
  optional string search = 3;
}

message GetBillingGroupResponse {
  BillingGroupMessage group = 1;
 // repeated BillingGroupConnectionRelMessage connections = 2;
}


// -------- Delete --------
message DeleteBillingGroupRequest {
  int64 version_id = 1;
  int32 deleted_by = 2;
}

message DeleteBillingGroupResponse {
  bool success = 1;
  string message = 2;
}


// -------- List --------
message ListBillingGroupRequest {
  int32 page = 1;
  int32 page_size = 2;

  optional string search = 3;
  optional int32 billing_group_id = 4;
  optional bool is_active = 5;
}

message ListBillingGroupResponse {
  repeated BillingGroupMessage groups = 1;
}

message BillingGroupPaginatedListRequest {
  optional string search = 1;
  optional int32 billing_group_id = 2;
  optional bool is_active = 3;

  int32 page_number = 4;
  int32 page_size = 5;

  optional string sort_by = 6;          // name, billing_group_id, etc
  optional string sort_direction = 7;   // "asc" / "desc"
}

// Paginated list response
message BillingGroupPaginatedListResponse {
  repeated BillingGroupMessage groups = 1;

  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}


// ---------------------- SERVICE ----------------------

service BillingGroupService {
  rpc CreateBillingGroup (CreateBillingGroupRequest)
      returns (CreateBillingGroupResponse);

  rpc UpdateBillingGroup (UpdateBillingGroupRequest)
      returns (UpdateBillingGroupResponse);

  rpc GetBillingGroup (GetBillingGroupRequest)
      returns (GetBillingGroupResponse);

  rpc DeleteBillingGroup (DeleteBillingGroupRequest)
      returns (DeleteBillingGroupResponse);

  rpc ListBillingGroup (ListBillingGroupRequest)
      returns (ListBillingGroupResponse);

  rpc ListBillingGroupPaginated (BillingGroupPaginatedListRequest)
      returns (BillingGroupPaginatedListResponse);
}
