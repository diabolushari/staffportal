syntax = "proto3";

package com.kseb.consumerservice.proto.metering;

import "google/protobuf/timestamp.proto";

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";


option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.metering";
option java_outer_classname = "MeterTimezoneTypeRelProto";

import "parameters/parameter-value.proto";

// MeterTimezoneTypeRel Message
message MeterTimezoneTypeRel {
  int32 version_id = 1;
  int32 rel_id = 2;
  int32 meter_id = 3; // Assuming Meter is identified by its ID
  com.kseb.consumerservice.proto.parameters.ParameterValueProto timezone_type = 4;
  google.protobuf.Timestamp effective_start_ts = 5;
  google.protobuf.Timestamp effective_end_ts = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_ts = 8;
  google.protobuf.Timestamp updated_ts = 9;
  int32 created_by = 10;
  int32 updated_by = 11;
}

// Request for creating a MeterTimezoneTypeRel
message CreateMeterTimezoneTypeRelRequest {
  // rel_id can be provided by the client or will be generated by the service
  optional int32 rel_id = 1;
  int32 meter_id = 2;
  int32 timezone_type_id = 3;
  // effective_start_ts and is_active are set by the service
  optional int32 created_by = 4;
}

// Request for updating a MeterTimezoneTypeRel (SCD Type 2)
message UpdateMeterTimezoneTypeRelRequest {
  int32 rel_id = 1;
  int32 meter_id = 2;
  int32 timezone_type_id = 3;
  // effective_start_ts and is_active are set by the service
  optional int32 updated_by = 4;
}

// Request for getting a MeterTimezoneTypeRel by version ID
message GetMeterTimezoneTypeRelByVersionIdRequest {
  int32 version_id = 1;
}

// Request for getting the active MeterTimezoneTypeRel by rel_id and meter_id
message GetActiveMeterTimezoneTypeRelRequest {
  int32 rel_id = 1;
}

// Response for a single MeterTimezoneTypeRel
message MeterTimezoneTypeRelResponse {
  MeterTimezoneTypeRel meter_timezone_type_rel = 1;
}

// Response for a list of MeterTimezoneTypeRel (though not directly used in current service methods, good for future list operations)
message MeterTimezoneTypeRelListResponse {
  repeated MeterTimezoneTypeRel meter_timezone_type_rels = 1;
}

// Request for getting the active MeterTimezoneTypeRel by meter_id
message GetActiveMeterTimezoneTypeRelByMeterIdRequest {
  int32 meter_id = 1;
}

// Service definition
service MeterTimezoneTypeRelService {
  rpc CreateMeterTimezoneTypeRel(
      CreateMeterTimezoneTypeRelRequest) returns (MeterTimezoneTypeRelResponse);
  rpc UpdateMeterTimezoneTypeRel(
      UpdateMeterTimezoneTypeRelRequest) returns (MeterTimezoneTypeRelResponse);
  rpc GetMeterTimezoneTypeRelByVersionId(
      GetMeterTimezoneTypeRelByVersionIdRequest) returns (MeterTimezoneTypeRelResponse);
  rpc GetActiveMeterTimezoneTypeRel(
      GetActiveMeterTimezoneTypeRelRequest) returns (MeterTimezoneTypeRelResponse);
  rpc GetActiveMeterTimezoneTypeRelByMeterId(
      GetActiveMeterTimezoneTypeRelByMeterIdRequest) returns (MeterTimezoneTypeRelResponse);
}
