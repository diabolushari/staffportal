syntax = "proto3";

package com.kseb.consumerservice.proto.metering;

option php_namespace = "Proto\\Metering";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";
import "google/protobuf/timestamp.proto";

message MeterTransformerMessage {
  int64 meter_ctpt_id = 1;
  int64 ownership_type_id = 2;
  int64 accuracy_class_id = 3;
  int64 burden_id = 4;
  int64 make_id = 5;
  int64 type_id = 6;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto ownership_type = 7;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto accuracy_class = 8;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto burden = 9;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto make = 10;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto type = 11;
  string ctpt_serial = 12;
  string ratio_primary_value = 13;
  string ratio_secondary_value = 14;
  string created_ts = 15;
  string updated_ts = 16;
  int64 created_by = 17;
  int64 updated_by = 18;
  bool is_active = 19;
  google.protobuf.Timestamp manufacture_date = 20;
  optional bool is_edit = 21;
}

message CreateMeterTransformerMessage {
  int64 ownership_type_id = 1;
  int64 accuracy_class_id = 2;
  int64 burden_id = 3;
  int64 make_id = 4;
  int64 type_id = 5;
  string ctpt_serial = 6;
  string ratio_primary_value = 7;
  string ratio_secondary_value = 8;
  bool is_active = 9;
  int64 created_by = 10;
  google.protobuf.Timestamp manufacture_date = 11;
}

message CreateMeterTransformerRequest {
  CreateMeterTransformerMessage transformer = 1;
}

message UpdateMeterTransformerMessage{
  int64 meter_ctpt_id = 1;
  optional int64 ownership_type_id = 2;
  optional int64 accuracy_class_id = 3;
  optional int64 burden_id = 4;
  optional int64 make_id = 5;
  optional int64 type_id = 6;

  optional string ctpt_serial = 7;
  optional string ratio_primary_value = 8;
  optional string ratio_secondary_value = 9;

  optional int64 updated_by = 10;
  optional google.protobuf.Timestamp manufacture_date = 11;
}


message UpdateMeterTransformerRequest {
  UpdateMeterTransformerMessage transformer = 1;
}


message GetMeterTransformerRequest    { int64 meter_ctpt_id = 1; }
message DeleteMeterTransformerRequest { int64 meter_ctpt_id = 1; }


message ListMeterTransformersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string ctpt_serial = 3;
  bool is_active = 4;
}

message ListUnassignedMeterTransformersRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string type = 3;
}

message ListMeterTransformersResponse {
  repeated MeterTransformerMessage transformers = 1;
}

message ListUnassignedMeterTransformersPaginatedRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  optional string ctpt_serial = 3;
  optional int64 type_id = 4;
  optional string type = 5;
  optional int64 ownership_type_id = 6;
  optional int64 make_id = 7;
  optional string ratio_value = 8;

}

message MeterTransformerPaginatedListRequest {
  optional string ctpt_serial = 1;
  int32 page_number = 2;
  int32 page_size = 3;
  optional string sort_by = 4;
  optional string sort_direction = 5;
  optional int64 type_id = 6;
  optional string type = 7;
  optional int64 ownership_type_id = 8;
  optional int64 make_id = 9;
  optional string ratio_value = 10;
}

message MeterTransformerPaginatedListResponse {
  repeated MeterTransformerMessage transformers = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  optional int64 type_id = 6;
}

message MeterTransformerResponse {
  optional MeterTransformerMessage transformer = 1;
}


service MeterTransformerService {
  rpc CreateMeterTransformer(CreateMeterTransformerRequest) returns (MeterTransformerMessage);
  rpc UpdateMeterTransformer(UpdateMeterTransformerRequest) returns (MeterTransformerMessage);
  rpc GetMeterTransformer(GetMeterTransformerRequest)       returns (MeterTransformerResponse);
  rpc DeleteMeterTransformer(DeleteMeterTransformerRequest) returns (google.protobuf.Empty);
  rpc ListMeterTransformers(ListMeterTransformersRequest)   returns (ListMeterTransformersResponse);
  rpc ListUnassignedMeterTransformers(ListUnassignedMeterTransformersRequest)   returns (ListMeterTransformersResponse);
  rpc ListUnassignedMeterTransformersPaginated(ListUnassignedMeterTransformersPaginatedRequest) returns (MeterTransformerPaginatedListResponse);
  rpc ListMeterTransformersPaginated(MeterTransformerPaginatedListRequest) returns (MeterTransformerPaginatedListResponse);
}

