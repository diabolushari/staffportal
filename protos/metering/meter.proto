syntax = "proto3";

package com.kseb.consumerservice.proto.metering;


option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "parameters/parameter-value.proto";
import "metering/meter-transformer.proto";
import "metering/meter_timezone_type_rel.proto";


service MeterService {
  rpc CreateMeter(MeterFormRequest) returns (google.protobuf.Empty);
  rpc GetMeter(GetMeterRequest) returns (MeterResponseMessage);
  rpc ListMeters(ListMetersRequest) returns (ListMetersResponse);
  rpc UpdateMeter(MeterFormRequest) returns (MeterResponse);
  rpc DeleteMeter(DeleteMeterRequest) returns (google.protobuf.Empty);
  rpc ListMetersPaginated(MeterPaginatedListRequest) returns (MeterPaginatedListResponse);
  rpc ListUnassignedMeters(ListUnassignedMetersRequest) returns (ListUnassignedMetersResponse);
}

message ListUnassignedMetersRequest {
  int32 page_number = 1;
  int32 page_size = 2;
  optional string search = 3;
}

message ListUnassignedMetersResponse {
  repeated MeterResponse meters = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;

}

message ListMetersResponse {
  repeated MeterResponse meters = 1;
}

message GetMeterRequest {
  int32 meter_id = 1;
}

message ListMetersRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string meter_serial = 3;
}

message MeterFormRequest {
  optional int32 meter_id = 1;
  string meter_serial = 2;
  int32 ownership_type_id = 3;
  int32 meter_make_id = 4;
  int32 meter_type_id = 5;
  optional int32 meter_category_id = 6;
  int32 accuracy_class_id = 7;
  int32 dialing_factor_id = 8;
  optional string company_seal_num = 9;
  int32 digit_count = 10;
  optional string manufacture_date = 11;
  optional string supply_date = 12;
  int32 meter_unit_id = 13;
  int32 meter_reset_type_id = 14;
  bool smart_meter_ind = 15;
  bool bidirectional_ind = 16;
  int32 meter_phase_id = 17;
  int32 decimal_digit_count = 18;
  optional float programmable_pt_ratio = 19;
  optional int32 programmable_ct_ratio = 20;
  optional int32 warranty_period = 22;
  optional int32 meter_constant = 23;
  optional string batch_code = 24;
  int32 internal_ct_primary = 25;
  int32 internal_ct_secondary = 26;
  int32 internal_pt_primary = 27;
  int32 internal_pt_secondary = 28;
  int32 ct_count = 29;
  int32 pt_count = 30;
  optional int32 created_by = 31;
  optional int32 updated_by = 32;
}

message DeleteMeterRequest {
  int32 meter_id = 1;
}

message MeterTransformerMappingMessage {
  int32 version_id = 1;
  int64 ctpt_id = 2;
  com.kseb.consumerservice.proto.metering.MeterTransformerMessage ctpt = 3;
  int64 meter_id = 4;
  optional google.protobuf.Timestamp faulty_date = 5;
  optional google.protobuf.Timestamp ctpt_energise_date = 6;
  optional google.protobuf.Timestamp ctpt_change_date = 7;
  int64 status_id = 8;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto status = 9;
  optional int64 change_reason_id = 10;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto change_reason = 11;
  google.protobuf.Timestamp created_ts = 12;
  google.protobuf.Timestamp updated_ts = 13;
  int32 created_by = 14;
  int32 updated_by = 15;

}

message MeterResponse {

  // --- Core identifiers ---
  int32 meter_id = 1;
  string meter_serial = 2;

  // --- Parameter IDs (important for UI + updates) ---
  int32 ownership_type_id = 3;
  int32 meter_make_id = 4;
  int32 meter_type_id = 5;
  optional int32 meter_category_id = 6;
  int32 accuracy_class_id = 7;
  int32 dialing_factor_id = 8;
  int32 meter_unit_id = 9;
  int32 meter_reset_type_id = 10;
  int32 meter_phase_id = 11;

  // --- Parameter objects (read-only view) ---
  parameters.ParameterValueProto ownership_type = 12;
  parameters.ParameterValueProto meter_make = 13;
  parameters.ParameterValueProto meter_type = 14;
  parameters.ParameterValueProto meter_category = 15;
  parameters.ParameterValueProto accuracy_class = 16;
  parameters.ParameterValueProto dialing_factor = 17;
  parameters.ParameterValueProto meter_unit = 18;
  parameters.ParameterValueProto meter_reset_type = 19;
  parameters.ParameterValueProto meter_phase = 20;

  // --- Meter details ---
  optional string company_seal_num = 21;
  optional int32 digit_count = 22;
  optional int32 decimal_digit_count = 23;

  optional string manufacture_date = 24;
  optional string supply_date = 25;

  bool smart_meter_ind = 26;
  bool bidirectional_ind = 27;

  // --- Electrical configuration ---
  float programmable_pt_ratio = 28;
  int32 programmable_ct_ratio = 29;
  optional int32 meter_constant = 31;

  int32 internal_ct_primary = 32;
  int32 internal_ct_secondary = 33;
  int32 internal_pt_primary = 34;
  int32 internal_pt_secondary = 35;

  int32 ct_count = 36;
  int32 pt_count = 37;

  // --- Warranty / batch ---
  optional int32 warranty_period = 38;
  optional string batch_code = 39;

  // --- Audit ---
  string created_ts = 40;
  string updated_ts = 41;
  optional int32 created_by = 42;
  optional int32 updated_by = 43;

  // --- Relations ---
  repeated MeterTransformerMappingMessage transformers = 44;
  optional bool has_meter_reading = 45;
  repeated MeterTimezoneTypeRel meter_timezone_type_rel = 46;
}

message MeterResponseMessage {
  optional MeterResponse meter = 1;
}


message MeterPaginatedListRequest {
  optional string meter_serial = 1; // search filter
  int32 page_number = 2;
  int32 page_size = 3;
  optional string sort_by = 4;       
  optional string sort_direction = 5;

  optional bool smart_meter_ind = 6;
  optional bool bidirectional_ind = 7;

  optional int32 meter_type_id = 8;
  optional int32 meter_make_id = 9;
  optional int32 ownership_type_id = 10;

  optional int32 programmable_ct_ratio = 11;
  optional float programmable_pt_ratio = 12;
}

// Paginated list response
message MeterPaginatedListResponse {
  repeated MeterResponse meters = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}
