syntax = "proto3";

package com.kseb.consumerservice.proto.calendar;

option php_namespace = "Proto\\Calendar";
option php_metadata_namespace = "GPBMetadata";

option java_multiple_files = true;
option java_package = "com.kseb.consumerservice.proto.calendar";
option java_outer_classname = "CalendarProto";

import "google/protobuf/empty.proto";

service CalendarDayService {

  rpc ListCalendarDay (ListCalendarDayRequest)
      returns (ListCalendarDayResponse);

  rpc UpdateCalendar (UpdateCalendarDayRequest)
      returns (CalendarDayResponse);

  rpc ListCalendarPaginated (CalendarDayPaginatedListRequest)
      returns (CalendarDayPaginatedListResponse);
}

message ListCalendarDayRequest {
 optional string from_date = 1;
 optional string to_date   = 2;
}

message ListCalendarDayResponse {
  repeated CalendarDayResponse data = 1;
}

message CalendarDayPaginatedListRequest {
  optional string from_date = 1;
  optional string to_date   = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  optional string sort_by = 5;
  optional string sort_direction = 6;
}

message CalendarDayPaginatedListResponse {
  repeated CalendarDayResponse data = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message UpdateCalendarDayRequest {
  int32 id = 1;
  bool is_holiday = 2;
  bool is_weekend = 3;
  string remarks = 4;
}

message CalendarDayResponse {
  int32 id = 1;
  string calendar_date = 2;
  bool is_holiday = 3;
  bool is_weekend = 4;
  int32 day_of_week = 5;
  int32 day_of_year = 6;
  string remarks = 7;
}
