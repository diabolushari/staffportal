syntax = "proto3";

package com.kseb.consumerservice.proto.billing;

option php_namespace = "Proto\\Billing";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "billgenerationjob/bill_generation_job.proto";

message BillInitializeRequest {
  repeated int32 connection_ids = 1;
  int32 billing_group_id = 2;
  string bill_date = 3;
  google.protobuf.Timestamp bill_month_year = 4;
  google.protobuf.Timestamp reading_month_year = 5;
}

message BillInitializeResponse {
  com.kseb.consumerservice.proto.billgenerationjob.BillGenerationJobMessage bill_generation_job = 1;
}

service BillInitializeService {
  rpc InitializeBill(BillInitializeRequest) returns (BillInitializeResponse);
}
