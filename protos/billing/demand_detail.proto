syntax = "proto3";

package com.kseb.consumerservice.proto.billing;

option php_namespace = "Proto\\Billing";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";

// ----------------- ENTITY MESSAGE -----------------
message DemandDetailMessage {
  int64 id = 1;
  int64 demand_id = 2;
  int32 charge_head_id = 3;
  double amount = 4;

  optional google.protobuf.Timestamp created_ts = 5;
  optional google.protobuf.Timestamp updated_ts = 6;
  optional google.protobuf.Timestamp deleted_ts = 7;

  int32 created_by = 8;
  int32 updated_by = 9;
  int32 deleted_by = 10;

  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto charge_head = 11;
}





