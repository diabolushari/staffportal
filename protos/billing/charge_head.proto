syntax = "proto3";

package com.kseb.consumerservice.proto.billing;

option php_namespace = "Proto\\Billing";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";
import "billing/billing_rule.proto";
import "parameters/parameter-value.proto";
import "billing/charge_head_definition.proto";

// ----------------- ENTITY MESSAGE -----------------
message ChargeHeadMessage {
  int64 id = 1;
  int64 billing_rule_id = 2;
  int32 charge_head_definition_id = 3;
  google.protobuf.Struct calculations = 4;
  com.kseb.consumerservice.proto.billing.BillingRuleMessage billing_rule = 5;
  repeated com.kseb.consumerservice.proto.billing.ChargeHeadDefinitionMessage charge_head_definitions = 6;

  google.protobuf.Timestamp effective_start = 7;
  google.protobuf.Timestamp effective_end = 8;

  google.protobuf.Timestamp created_ts = 9;
  google.protobuf.Timestamp updated_ts = 10;
  google.protobuf.Timestamp deleted_ts = 11;

  int32 created_by = 12;
  int32 updated_by = 13;
  int32 deleted_by = 14;
}

// ----------------- FORM / CREATE / UPDATE -----------------
message ChargeHeadFormMessage {
  optional int64 id = 1;
  int64 billing_rule_id = 2;
  int32 charge_head_definition_id = 3;
  google.protobuf.Struct calculations = 4;
  google.protobuf.Timestamp effective_start = 5;
  optional google.protobuf.Timestamp effective_end = 6;

  optional int32 created_by = 7;
  optional int32 updated_by = 8;
  optional int32 deleted_by = 10;
}

// ----------------- CREATE -----------------
message CreateChargeHeadRequest {
  ChargeHeadFormMessage charge_head = 1;
}
message CreateChargeHeadResponse {
  ChargeHeadMessage charge_head = 1;
}

// ----------------- UPDATE -----------------
message UpdateChargeHeadRequest {
  ChargeHeadFormMessage charge_head = 1;
}
message UpdateChargeHeadResponse {
  ChargeHeadMessage charge_head = 1;
}

// ----------------- GET -----------------
message GetChargeHeadRequest {
  int64 id = 1;
}
message GetChargeHeadResponse {
  ChargeHeadMessage charge_head = 1;
}

// ----------------- DELETE -----------------
message DeleteChargeHeadRequest {
  int64 id = 1;
  optional int32 deleted_by = 2;
}
message DeleteChargeHeadResponse {
  bool success = 1;
  string message = 2;
}

// ----------------- LIST -----------------
message ListChargeHeadsRequest {
  optional string search = 1; 
  optional int64 billing_rule_id = 2;
  optional int64 name_id = 3;
}
message ListChargeHeadsResponse {
  repeated ChargeHeadMessage charge_heads = 1;
}

// ----------------- PAGINATED LIST -----------------
message ChargeHeadPaginatedListRequest {
  optional int64 billing_rule_id = 1;
  optional int64 name_id = 2;
  int32 page_number = 3;        
  int32 page_size = 4;          
  optional string sort_by = 5;  
  optional string sort_direction = 6; 
}

message ChargeHeadPaginatedListResponse {
  repeated ChargeHeadMessage charge_heads = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// ----------------- SERVICE -----------------
service ChargeHeadService {
  rpc CreateChargeHead (CreateChargeHeadRequest) returns (CreateChargeHeadResponse);
  rpc UpdateChargeHead (UpdateChargeHeadRequest) returns (UpdateChargeHeadResponse);
  rpc GetChargeHead (GetChargeHeadRequest) returns (GetChargeHeadResponse);
  rpc DeleteChargeHead (DeleteChargeHeadRequest) returns (DeleteChargeHeadResponse);
  rpc ListChargeHeads (ListChargeHeadsRequest) returns (ListChargeHeadsResponse);
  rpc ListChargeHeadsPaginated (ChargeHeadPaginatedListRequest) returns (ChargeHeadPaginatedListResponse);
}
