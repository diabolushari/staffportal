syntax = "proto3";

package com.kseb.consumerservice.grpc.consumers;

option php_namespace = "Proto\\Consumers";
option php_metadata_namespace = "GPBMetadata";

// Imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

// ------------ MESSAGE ------------

message OrgElementLocationMessage {
  int32 location_id = 1;
  int32 location_type_id = 2;
  double latitude = 3;
  double longitude = 4;
  string place_name = 5;
  int32 district_region_id = 6;
  int32 taluk_region_id = 7;
  google.protobuf.Struct region_info = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  int32 created_by = 11;
  int32 updated_by = 12;
}

// ------------ RESPONSES ------------

message OrgElementLocationResponse {
  OrgElementLocationMessage org_element_location = 1;
}

message OrgElementLocationListResponse {
  repeated OrgElementLocationMessage locations = 1;
}

// ------------ REQUESTS ------------

message OrgElementLocationIdRequest {
  int32 location_id = 1;
}

// ------------ SERVICE ------------

service OrgElementLocationService {
  rpc CreateOrgElementLocation(OrgElementLocationMessage) returns (OrgElementLocationResponse);
  rpc GetOrgElementLocationById(OrgElementLocationIdRequest) returns (OrgElementLocationResponse);
  rpc GetAllOrgElementLocations(google.protobuf.Empty) returns (OrgElementLocationListResponse);
  rpc UpdateOrgElementLocation(OrgElementLocationMessage) returns (OrgElementLocationResponse);
  rpc DeleteOrgElementLocation(OrgElementLocationIdRequest) returns (google.protobuf.Empty);
}
