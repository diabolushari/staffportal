syntax = "proto3";

package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";

message ConnectionGenerationTypeMessage {
  int64 id = 1;
  int32 connection_id = 2;
  int32 generation_type_id = 3;
  optional int32 generation_subtype_id = 4;

  google.protobuf.Timestamp effective_start = 5;
  google.protobuf.Timestamp effective_end = 6;
  bool is_current = 7;

  google.protobuf.Timestamp created_ts = 8;
  int32 created_by = 9;
  google.protobuf.Timestamp updated_ts = 10;
  int32 updated_by = 11;
  google.protobuf.Timestamp deleted_ts = 12;
  int32 deleted_by = 13;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto generation_type = 14;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto generation_subtype = 15;
}

message ConnectionGenerationFormRequest {
  optional int64 id = 1;
  int32 connection_id = 2;
  bool value = 3;
  optional int32 generation_type_id = 4;
  optional int32 generation_subtype_id = 5;
  int32 created_by = 6;
}

message CreateConnectionGenerationTypeResponse {
  ConnectionGenerationTypeMessage generation_type = 1;
}


message UpdateConnectionGenerationTypeRequest {
  int32 connection_id = 1;
  repeated ConnectionGenerationFormRequest generation_types = 2;
}

message UpdateConnectionGenerationTypeResponse {
  ConnectionGenerationTypeMessage generation_type = 1;
}

message GetConnectionGenerationTypeRequest {
  int64 id = 1;
}

message ListConnectionGenerationTypesByConnectionRequest {
  optional int32 connection_id = 1;
}

message ListConnectionGenerationTypesResponse {
  repeated ConnectionGenerationTypeMessage items = 1;
}

service ConnectionGenerationTypeService {

  rpc CreateConnectionGenerationType(
      ConnectionGenerationFormRequest
  ) returns (CreateConnectionGenerationTypeResponse);

  rpc UpdateConnectionGenerationType(
      UpdateConnectionGenerationTypeRequest
  ) returns (UpdateConnectionGenerationTypeResponse);

  rpc GetConnectionGenerationType(
      GetConnectionGenerationTypeRequest
  ) returns (ConnectionGenerationTypeMessage);

  rpc ListConnectionGenerationTypesByConnection(
      ListConnectionGenerationTypesByConnectionRequest
  ) returns (ListConnectionGenerationTypesResponse);
}
