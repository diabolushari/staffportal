syntax = "proto3";

// ✅ Must match Java package
package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

// Imports

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";
import "consumers/office.proto";
import "connections/consumer.proto";
import "metering/meter_connection_mapping.proto";
import "meterreading/meter_reading.proto";
import "connections/connection-flag.proto";
import "connections/connection-generation-type.proto";
import "greenenergy/green-energy.proto";
import "securitydeposit/sd-balance-summary.proto";
import "securitydeposit/sd-register.proto";


message ConnectionBillingGroupMessage {
  int64 version_id = 1;
  int32 billing_group_id = 2;
  string name = 3;
  optional string description = 4;
  string effective_start = 5;
  optional string effective_end = 6;
  bool is_active = 7;
  optional int32 created_by = 8;
  optional int32 updated_by = 9;
}

// Connection table
message ConnectionMessage {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_type_id = 3;
  int64 consumer_num = 4;
  int32 connection_status_id = 5;
  string connected_date = 6;
  int32 service_office_code = 7;
  int32 admin_office_code = 8;
  int32 voltage_id = 9;
  double contract_demand_kva_val = 10;
  double connected_load_kw_val = 11;
  int32 tariff_id = 12;
  int32 primary_purpose_id = 13;
  int32 connection_category_id = 14;
  int32 connection_subcategory_id = 15;
  google.protobuf.Struct connection_attribs = 16;
  google.protobuf.Struct purposes_info = 17;
  int32 billing_process_id = 18;
  int32 billing_side_id = 19;
  int32 open_access_type_id = 20;
  int32 metering_type_id = 21;
  google.protobuf.Struct connected_load_info = 22;
  google.protobuf.Struct multi_source_info = 23;
  google.protobuf.Timestamp effective_start = 24;
  google.protobuf.Timestamp effective_end = 25;
  optional bool is_current = 26;
  google.protobuf.Timestamp created_at = 27;
  google.protobuf.Timestamp updated_at = 28;
  int32 created_by = 29;
  int32 updated_by = 30;
  optional string consumer_legacy_code = 31;
  int32 phase_type_id = 32;
  double power_load_kw_val = 33;
  double light_load_kw_val = 34;
  bool othercons_flag = 35;
  string application_no = 36;
  optional string remarks = 37;
  optional int32 no_of_main_meters = 38;
  repeated int64 other_purposes = 39;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto consumer_type = 40;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_type = 41;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_status = 42;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto open_access_type = 43;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto metering_type = 44;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto phase_type = 45;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto voltage = 46;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_category = 47;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto connection_subcategory = 48;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto tariff = 49;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto primary_purpose = 50;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto billing_process = 51;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage admin_office = 52;
  optional com.kseb.consumerservice.grpc.consumers.OfficeMessage service_office = 53;
  repeated com.kseb.consumerservice.grpc.connections.ConsumerMessage consumer_profile = 54;
  optional com.kseb.consumerservice.proto.meterreading.MeterReadingMessage latest_meter_reading = 55;
  repeated com.kseb.consumerservice.grpc.connections.ConnectionFlagMessage connection_flags = 56;
  repeated com.kseb.consumerservice.grpc.connections.ConnectionGenerationTypeMessage connection_generation_types = 57;
  optional com.kseb.consumerservice.proto.meterreading.MeterReadingMessage previous_reading = 58;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto billing_side = 59;
  repeated com.kseb.consumerservice.proto.greenenergy.GreenEnergyMessage green_energy = 60;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto alternate_tariff = 61;
  repeated com.kseb.consumerservice.grpc.securitydeposit.SdBalanceSummaryMessage sd_balance_summary = 62;
  optional com.kseb.consumerservice.grpc.securitydeposit.SdRegisterMessage latest_sd_register = 63;
  optional ConnectionBillingGroupMessage billing_group = 64;
}


message CreateConnectionRequest {
  int32 connection_type_id = 1;
  int32 connection_status_id = 2;
  string connected_date = 3;
  int32 service_office_code = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  int32 tariff_id = 8;
  int32 primary_purpose_id = 9;
  int32 connection_category_id = 10;
  int32 connection_subcategory_id = 11;
  google.protobuf.Struct connection_attribs = 12;
  google.protobuf.Struct purposes_info = 13;
  int32 billing_process_id = 14;
  int32 billing_side_id = 15;
  int32 open_access_type_id = 16;
  int32 metering_type_id = 17;
  google.protobuf.Struct connected_load_info = 18;
  google.protobuf.Struct multi_source_info = 19;
  int32 created_by = 20;
  int32 updated_by = 21;
  optional string consumer_legacy_code = 22;
  int32 phase_type_id = 23;
  double power_load_kw_val = 24;
  double light_load_kw_val = 25;
  bool othercons_flag = 26;
  string application_no = 27;
  optional string remarks = 28;
  optional int32 no_of_main_meters = 29;
  repeated int64 other_purposes = 30;
  repeated com.kseb.consumerservice.grpc.connections.ConnectionFlagFormRequest connection_flags = 31;
  repeated com.kseb.consumerservice.grpc.connections.ConnectionGenerationFormRequest connection_generation_types = 32;

}

message GetConnectionRequest{
  int32 connection_id = 1;
}

message GetConnectionResponse {
  ConnectionMessage connection = 1;
  repeated com.kseb.consumerservice.proto.metering.MeterConnectionMappingResponse meters = 2;
}

message CreateConnectionResponse {
  ConnectionMessage connection = 1;
}


message ListConnectionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;
  optional int32 consumer_type_id = 5;
  optional int32 primary_purpose_id = 6;
  optional string consumer_legacy_code = 7;
  optional string search = 8;
}
message ListConnectionsResponse {
  repeated ConnectionMessage items = 1;
}

message ListConnectionsPaginatedRequest {
  optional int32 connection_type_id = 1;
  optional string search = 2;
  optional string consumer_number = 3;
  optional int32 office_code = 4;
  optional int32 consumer_type_id = 5;
  optional int32 primary_purpose_id = 6;
  optional int32 tariff_id = 7;
  optional string consumer_legacy_code = 8;
  optional string organisation_name = 9;
  optional string consumer_name = 10;
  optional int64 primary_phone = 11;
  optional string from_date = 12;
  optional string to_date = 13;
  int32 page_number = 14;
  int32 page_size = 15;
  optional string sort_by = 16;
  optional string sort_direction = 17;
}
message ListConnectionsPaginatedResponse {
  repeated ConnectionMessage items = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// Response message for delete operations
message DeleteResponse {
  bool success = 1;
  string message = 2;
}

// Request messages
message ConnectionRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerProfileRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConsumerAddressRequest {
  int32 address_id = 1;
}

message ConsumerContactDetailsRequest {
  int32 connection_id = 1;
  int32 version_id = 2;
}

message ConnectionUpdateRequest {
  int32 version_id = 1;
  int32 connection_id = 2;
  int32 connection_status_id = 3;
  string connected_date = 4;
  int32 admin_office_code = 5;
  int32 voltage_id = 6;
  double contract_demand_kva_val = 7;
  double connected_load_kw_val = 8;
  int32 tariff_id = 9;
  int32 primary_purpose_id = 10;
  int32 connection_category_id = 11;
  int32 connection_subcategory_id = 12;
  google.protobuf.Struct connection_attribs = 13;
  google.protobuf.Struct purposes_info = 14;
  int32 billing_process_id = 15;
  int32 billing_side_id = 16;
  int32 open_access_type_id = 17;
  int32 metering_type_id = 18;
  google.protobuf.Struct connected_load_info = 19;
  google.protobuf.Struct multi_source_info = 20;
  int32 updated_by = 21;
  optional string consumer_legacy_code = 22;
  int32 phase_type_id = 23;
  double power_load_kw_val = 24;
  double light_load_kw_val = 25;
  bool othercons_flag = 26;
  string application_no = 27;
  optional string remarks = 28;
  optional int32 no_of_main_meters = 29;
  repeated int64 other_purposes = 30;
}

message ConnectionUpdateResponse {
  ConnectionMessage connection = 1;
}

message ConnectionSdBalanceSummaryListRequest {
  optional int32 connection_id = 1;
  optional string group=2;
  optional bool is_settled=3;
  optional string date_from=4;
  optional string date_to=5;
  int32 page_number = 6;
  int32 page_size = 7;
}

message ConnectionSdBalanceSummaryListResponse {
 repeated ConnectionMessage connection = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}


// Service definitions
service ConnectionService {
  rpc CreateConnection(CreateConnectionRequest) returns (CreateConnectionResponse);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc ListConnectionsPaginated(ListConnectionsPaginatedRequest) returns (ListConnectionsPaginatedResponse);
  rpc GetConnection(GetConnectionRequest) returns (GetConnectionResponse);
  rpc UpdateConnection(ConnectionUpdateRequest) returns (ConnectionUpdateResponse);
  rpc DeleteConnection(ConnectionRequest) returns (DeleteResponse);
  rpc ListConnectionSdBalanceSummaries(ConnectionSdBalanceSummaryListRequest) returns (ConnectionSdBalanceSummaryListResponse);
}
