syntax = "proto3";

package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";


message ConnectionFlagMessage {
  int64 id = 1;
  int32 connection_id = 2;
  int32 flag_id = 3;

  google.protobuf.Timestamp effective_start = 4;
  google.protobuf.Timestamp effective_end = 5;
  bool is_current = 6;

  google.protobuf.Timestamp created_ts = 7;
  int32 created_by = 8;
  google.protobuf.Timestamp updated_ts = 9;
  int32 updated_by = 10;
  google.protobuf.Timestamp deleted_ts = 11;
  int32 deleted_by = 12;

  com.kseb.consumerservice.proto.parameters.ParameterValueProto flag = 13;
}


message ConnectionFlagFormRequest {
  optional int64 id = 1;
  int32 connection_id = 2;
  bool value = 3;
  int32 flag_id = 4;
  int32 created_by = 5;
}

message CreateConnectionFlagResponse {
  ConnectionFlagMessage flag = 1;
}


message UpdateConnectionFlagRequest {
  int32 connection_id = 1;
  repeated ConnectionFlagFormRequest flags = 2;
}

message UpdateConnectionFlagResponse {
  ConnectionFlagMessage flag = 1;
}


message GetConnectionFlagRequest {
  int64 id = 1;
}

message ListConnectionFlagsByConnectionRequest {
  optional int32 connection_id = 1;
}

message ListConnectionFlagsResponse {
  repeated ConnectionFlagMessage items = 1;
}


service ConnectionFlagService {

  rpc CreateConnectionFlag(
      ConnectionFlagFormRequest
  ) returns (CreateConnectionFlagResponse);

  rpc UpdateConnectionFlag(
      UpdateConnectionFlagRequest
  ) returns (UpdateConnectionFlagResponse);

  rpc GetConnectionFlag(
      GetConnectionFlagRequest
  ) returns (ConnectionFlagMessage);

  rpc ListConnectionFlagsByConnection(
      ListConnectionFlagsByConnectionRequest
  ) returns (ListConnectionFlagsResponse);
}
