syntax = "proto3";

package com.kseb.consumerservice.grpc.connections;

option php_namespace = "Proto\\Connections";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "connections/consumer_contact_detail.proto";
import "parameters/parameter-value.proto";
import "connections/connection-flag.proto";

message ConsumerMessage {
  optional int32 version_id = 1;
  int32 connection_id = 2;
  int32 consumer_type_id = 3;
  string virtual_account_number = 4;
  optional string contact_person = 5;
  optional int32 department_name_id = 6;
  string organization_name = 7;
  string consumer_pan = 8;
  string consumer_tan = 9;
  string consumer_gstin = 10;
  optional google.protobuf.Struct manufacturing_info = 11;
  optional google.protobuf.Struct tax_info = 12;
  optional google.protobuf.Struct identity_info = 13;
  optional google.protobuf.Struct application_info = 14;
  optional bool is_current = 15;
  optional google.protobuf.Struct addresses = 16;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto consumer_type = 17;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto department_name = 18;
  string consumer_cin = 19;
  int32 consumer_ownership_type_id = 20;
  string consumer_name = 21;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto consumer_ownership_type = 22;
  repeated connections.ConnectionFlagFormRequest consumer_flags = 23;
  repeated connections.ConnectionFlagMessage consumer_flags_message = 24;
  repeated connections.ConsumerContactDetailMessage consumer_contact_details = 25;
  
}

message AddressMessage {
    optional int32 address_id = 1;
    string address_line_1 = 2;
    string address_line_2 = 3;
    string city_town_village = 4;
    string state = 5;
    int32 pincode = 6;
    int32 district_id = 7;
    int32 state_id = 8;
}

message ContactMessage {
    int32 connection_id = 1;
    optional int32 version_id = 2;
    string primary_email = 3;
    int64 primary_phone = 4;
    google.protobuf.Struct contact_folio = 5;
    optional bool is_current = 6;
}


message ConsumerCreateRequest {
  ConsumerMessage consumer = 1;
  AddressMessage address = 2;
  ContactMessage contact = 3;
}


message ConsumerUpdateRequest {
    ConsumerMessage consumer = 1;
    AddressMessage address = 2;
   ContactMessage contact = 3;
}

message ConsumerIdRequest {
  int32 connection_id = 1;
}

message ConsumerListResponse {
  repeated ConsumerMessage consumers = 1;
}

message GetConsumerResponse {
  ConsumerMessage consumer = 1;
 optional ConsumerContactDetailMessage contact = 2;
}

service ConsumerService {
  rpc CreateConsumer(ConsumerCreateRequest) returns (ConsumerMessage);
  rpc GetConsumerById(ConsumerIdRequest) returns (GetConsumerResponse);
  rpc GetAllConsumers(google.protobuf.Empty) returns (ConsumerListResponse);
  rpc UpdateConsumer(ConsumerUpdateRequest) returns (ConsumerMessage);
  rpc DeleteConsumer(ConsumerIdRequest) returns (google.protobuf.Empty);
}
