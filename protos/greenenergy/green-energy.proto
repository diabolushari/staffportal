syntax = "proto3";

package com.kseb.consumerservice.proto.greenenergy;


option php_namespace = "Proto\\GreenEnergy";
option php_metadata_namespace = "GPBMetadata";


import "google/protobuf/empty.proto";
import "parameters/parameter-value.proto";

message GreenEnergyMessage {
  int32 id = 1;
  int32 connection_id = 2;
  int32 green_energy_type_id = 3;
  int32 agreement_authority_id = 4;
  double percentage = 5;
  string remarks = 6;
  int32 created_by = 7;
  int32 updated_by = 8;
  bool is_active = 9;
  optional string effective_start_ts = 10;
  optional string effective_end_ts = 11;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto green_energy_type = 12;
  com.kseb.consumerservice.proto.parameters.ParameterValueProto agreement_authority = 13;
}

message CreateGreenEnergyMessage {
  int32 connection_id = 1;
  int32 green_energy_type_id = 2;
  int32 agreement_authority_id = 3;
  double percentage = 4;
  string remarks = 5;
  bool is_active = 6;
  optional string effective_start_ts = 7;
  optional string effective_end_ts = 8;
  int32 created_by = 9;
}

message CreateGreenEnergyRequest {
  CreateGreenEnergyMessage green_energy = 1;
}

message CreateGreenEnergyResponse {
  GreenEnergyMessage green_energy = 1;
}

message UpdateGreenEnergyMessage {
  int32 id = 1;
  int32 connection_id = 2;
  int32 green_energy_type_id = 3;
  int32 agreement_authority_id = 4;
  double percentage = 5;
  string remarks = 6;
  bool is_active = 7;
  optional string effective_start_ts = 8;
  optional string effective_end_ts = 9;
  int32 updated_by = 10;
}

message UpdateGreenEnergyRequest {
  UpdateGreenEnergyMessage green_energy = 1;
}

message UpdateGreenEnergyResponse {
  GreenEnergyMessage green_energy = 1;
}

message DeleteGreenEnergyRequest {
  int32 id = 1;
}

service GreenEnergyService {
  rpc CreateGreenEnergy(CreateGreenEnergyRequest) returns (CreateGreenEnergyResponse);
  rpc UpdateGreenEnergy(UpdateGreenEnergyRequest) returns (UpdateGreenEnergyResponse);
  rpc DeleteGreenEnergy(DeleteGreenEnergyRequest) returns (google.protobuf.Empty);
}
