syntax = "proto3";

package com.kseb.consumerservice.proto.generatingstation;


option php_namespace = "Proto\\GeneratingStation";
option php_metadata_namespace = "GPBMetadata";

import "connections/connections.proto";
import "connections/consumer.proto";
import "connections/consumer_address.proto";
import "parameters/parameter-value.proto";
import "generatingstation/generating-station-attribute.proto";
import "generatingstation/station-transaction-ledger.proto";
import "generatingstation/station-unit-bank-summary.proto";

message GeneratingStationMessage {
  optional int32 version_id = 1;
  optional int32 station_id = 2;
  optional int32 connection_id = 3;

  string station_name = 4;

  int32 generation_status_id = 5;
  double installed_capacity = 6;

  int32 generation_type_id = 7;
  int32 voltage_category_id = 8;
  int32 plant_type_id = 9;
  string commissioning_date = 10;

  int32 address_id = 11;   

  bool is_current = 12;

  optional int32 created_by = 13;
  optional int32 updated_by = 14;
  optional int32 deleted_by = 15;

  optional com.kseb.consumerservice.grpc.connections.ConnectionMessage connection = 16;
  optional com.kseb.consumerservice.grpc.connections.ConsumerAddressMessage address = 17;

  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto generation_type = 18;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto voltage_category = 19;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto plant_type = 20;
  optional com.kseb.consumerservice.proto.parameters.ParameterValueProto generation_status = 21;

  repeated GeneratingStationAttributeResponse attributes = 22;
  repeated com.kseb.consumerservice.proto.generatingstation.StationUnitBankSummaryMessage unit_bank_summaries = 23;
}

message CreateGeneratingStationRequest {
  GeneratingStationMessage station = 1;
  optional com.kseb.consumerservice.grpc.connections.AddressMessage address = 2;
  repeated GeneratingStationAttributeRequest attributes = 3;
}

message CreateGeneratingStationResponse {
  GeneratingStationMessage station = 1;
}

message UpdateGeneratingStationRequest {
  GeneratingStationMessage station = 1;
  optional com.kseb.consumerservice.grpc.connections.AddressMessage address = 2;
  repeated GeneratingStationAttributeRequest attributes = 3;
}

message UpdateGeneratingStationResponse {
  GeneratingStationMessage station = 1;
}

message GetGeneratingStationRequest {
  int32 station_id = 1;
}

message GetGeneratingStationResponse {
 optional GeneratingStationMessage station = 1;
}

message DeleteGeneratingStationRequest {
  int32 station_id = 1;
}

message DeleteGeneratingStationResponse {
  bool success = 1;
}

message ListGeneratingStationRequest {
 optional string search = 1;
}

message ListGeneratingStationResponse {
  repeated GeneratingStationMessage items = 1;
}

message ListStationTransactionsRequest {
  int32 station_id = 1;
  optional int32 transaction_type_id = 2;
  optional string consumer_number = 3;
  optional string date_from = 4;
  optional string date_to = 5;
}

message ListStationTransactionsResponse {
  repeated StationTransactionLedgerMessage items = 1;
}

message ListGeneratingStationPaginatedRequest {
  optional string station_name = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
  optional string consumer_number = 4;
  optional int32 generation_type_id = 5;
  optional int32 voltage_category_id = 6;
  optional int32 plant_type_id = 7;
  optional int32 generation_status_id = 8;
  optional string date_from = 9;
  optional string date_to = 10;
}

message ListGeneratingStationPaginatedResponse {
  repeated GeneratingStationMessage items = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

service GeneratingStationService {

  rpc CreateGeneratingStation(CreateGeneratingStationRequest)
      returns (CreateGeneratingStationResponse);

  rpc UpdateGeneratingStation(UpdateGeneratingStationRequest)
      returns (UpdateGeneratingStationResponse);

 rpc GetGeneratingStation(GetGeneratingStationRequest)
    returns (GetGeneratingStationResponse);

  rpc DeleteGeneratingStation(DeleteGeneratingStationRequest)
      returns (DeleteGeneratingStationResponse);

  rpc ListGeneratingStation(ListGeneratingStationRequest)
      returns (ListGeneratingStationResponse);

  rpc ListStationTransactions(ListStationTransactionsRequest)
      returns (ListStationTransactionsResponse);
      
  rpc ListGeneratingStationPaginated(ListGeneratingStationPaginatedRequest)
      returns (ListGeneratingStationPaginatedResponse);
}