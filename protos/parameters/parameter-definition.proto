syntax = "proto3";

package com.kseb.consumerservice.proto.parameters;

// Java options
option java_multiple_files = true;
option java_package        = "com.kseb.consumerservice.proto.parameters";
option java_outer_classname = "ParameterDefinitionOuter";

// PHP options
option php_namespace = "Proto\\Parameters";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "parameters/parameter-domain.proto";

// ------------ MESSAGE ------------
message ParameterDefinitionProto  {
  int64 id = 1;
  int64 domain_id = 2;
  bool is_effective_date_driven = 3;
  string parameter_name = 4;
  string attribute1_name = 5;
  string attribute2_name = 6;
  string attribute3_name = 7;
  string attribute4_name = 8;
  string attribute5_name = 9;
  com.kseb.consumerservice.proto.parameters.ParameterDomainProto domain = 10;
  optional int32 created_by = 11;
  optional int32 updated_by = 12;
}

// ------------ REQUEST/RESPONSE ------------
message CreateParameterDefinitionRequest  { ParameterDefinitionProto  definition = 1; }
message UpdateParameterDefinitionRequest  { ParameterDefinitionProto  definition = 1; }
message GetParameterDefinitionRequest     { optional int64 id = 1; optional string domain_name = 2; optional string parameter_name = 3; optional string system_module_name = 4; }
message DeleteParameterDefinitionRequest  { int64 id = 1; }
message ListParameterDefinitionsRequest   { int32 page = 1; int32 page_size = 2; string domain_name = 3; string module_name = 4; string search = 5;   }
message ListParameterDefinitionsResponse  { repeated ParameterDefinitionProto  definitions = 1; }

message ParameterDefinitionPaginatedListRequest {
  optional string domain_name = 1;
  optional string module_name = 2;
  optional string search = 3;

  int32 page_number = 4;
  int32 page_size = 5;

  optional string sort_by = 6;        
  optional string sort_direction = 7;
}
message ParameterDefinitionPaginatedListResponse {
  repeated ParameterDefinitionProto definitions = 1;

  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message ParameterDefinitionGetResponse {
 optional ParameterDefinitionProto definition = 1;
}


// ------------ SERVICE ------------
service ParameterDefinitionService {
  rpc CreateParameterDefinition (CreateParameterDefinitionRequest)  returns (ParameterDefinitionProto);
  rpc GetParameterDefinition    (GetParameterDefinitionRequest)     returns (ParameterDefinitionGetResponse);
  rpc UpdateParameterDefinition (UpdateParameterDefinitionRequest)  returns (ParameterDefinitionProto);
  rpc DeleteParameterDefinition (DeleteParameterDefinitionRequest)  returns (google.protobuf.Empty);
  rpc ListParameterDefinitions  (ListParameterDefinitionsRequest)   returns (ListParameterDefinitionsResponse);
  rpc ListParameterDefinitionsPaginated  (ParameterDefinitionPaginatedListRequest)   returns (ParameterDefinitionPaginatedListResponse);
}
