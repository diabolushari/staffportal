syntax = "proto3";

package com.kseb.consumerservice.proto.parameters;

option php_namespace = "Proto\\Parameters";
option php_metadata_namespace = "GPBMetadata";

import "google/protobuf/empty.proto";
import "parameters/parameter-definition.proto"; 

// ----------- MESSAGE ------------
message ParameterValueProto {
  int64  id                   = 1;
  int64  definition_id        = 2;
  string parameter_code       = 3;
  int64  parent_id            = 4;
  string parameter_value      = 5;
  string attribute1_value     = 6;
  string attribute2_value     = 7;
  string attribute3_value     = 8;
  string attribute4_value     = 9;
  string attribute5_value     = 10;
  string effective_start_date = 11;
  string effective_end_date   = 12;
  bool   is_active            = 13;
  int32  sort_priority        = 14;
  string notes                = 15;
  ParameterDefinitionProto definition = 16; 
}

// ----------- REQUEST/RESPONSE ------------
message CreateParameterValueRequest {
  ParameterValueProto value = 1;
}

message UpdateParameterValueRequest {
  ParameterValueProto value = 1;
}

message GetParameterValueRequest {
 optional int64 id = 1;
 optional string parameter_value = 2;
}

message DeleteParameterValueRequest {
  int64 id = 1;
}

message ListParameterValuesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string domain_name = 3;
  string parameter_name = 4;
  string attribute_name = 5;  
  string attribute_value = 6;  
  string search = 7;
}

message ParameterValuePaginatedListRequest {
  optional string parameter_value = 1;
  optional string parameter_name = 2;
  optional string domain_name = 3;
  optional string search = 4;  
  int32 page_number = 5;
  int32 page_size = 6;
  optional string sort_by = 7;    
  optional string sort_direction = 8;
  optional string attribute_name = 9;
  optional string attribute_value = 10;
}

message ParameterValuePaginatedListResponse {
  repeated ParameterValueProto values = 1;
  int64 total_count = 2;
  int32 page_number = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message ListParameterValuesResponse {
  repeated ParameterValueProto values = 1;
}

// ----------- SERVICE ------------
service ParameterValueService {
  rpc CreateParameterValue (CreateParameterValueRequest) returns (ParameterValueProto);
  rpc UpdateParameterValue (UpdateParameterValueRequest) returns (ParameterValueProto);
  rpc GetParameterValue    (GetParameterValueRequest)    returns (ParameterValueProto);
  rpc DeleteParameterValue (DeleteParameterValueRequest) returns (google.protobuf.Empty);
  rpc ListParameterValues  (ListParameterValuesRequest)  returns (ListParameterValuesResponse);
  rpc ListParameterValuesPaginated  (ParameterValuePaginatedListRequest)  returns (ParameterValuePaginatedListResponse);
}
